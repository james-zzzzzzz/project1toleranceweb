<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>幼儿26字母英语启蒙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            background: #fff7e6;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overscroll-behavior: none;
        }
        h1 {
            color: #ff7096;
            margin-bottom: 16px;
            font-size: 24px;
            text-align: center;
        }
        .control-buttons{
            display:flex;
            gap:10px;
            margin-bottom:20px;
        }
        .ctrl-btn{
            padding:8px 12px;
            border-radius:20px;
            border:none;
            background:#70bfff;
            color:white;
            font-size:15px;
            cursor:pointer;
        }
        .ctrl-btn.active{
            background:#2980b9;
        }
        .card-container {
            width: 320px;
            height: 420px;
            position: relative;
            perspective: 1000px;
        }
        .letter-card {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 0.4s ease;
            z-index: 2;
        }
        .letter-card.animate {
            transform: scale(1.1) rotate(3deg);
        }
        .big-letter {
            font-size: 110px;
            font-weight: bold;
            color: #42b983;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s ease;
        }
        .word-box {
            margin-top: 20px;
            padding: 12px 24px;
            background: #ffedcc;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .animal-word {
            font-size: 24px;
            color: #666;
            font-weight: bold;
        }
        .cn-name {
            font-size: 16px;
            color: #999;
            margin-top: 4px;
        }
        .tip {
            font-size: 14px;
            color: #bbb;
            text-align: center;
            margin-top: 18px;
            line-height: 1.6;
        }
        .btn-next {
            margin-top: 20px;
            padding: 12px 30px;
            background: #57cc99;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
        }
        /* 动物图片卡片 */
        .animal-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .animal-modal.show {
            opacity: 1;
            pointer-events: auto;
        }
        .animal-modal-card {
            background: white;
            width: 300px;
            border-radius: 24px;
            overflow: hidden;
            transform: translateY(50px);
            transition: transform 0.4s ease;
        }
        .animal-modal.show .animal-modal-card {
            transform: translateY(0);
        }
        .animal-image {
            width: 100%;
            height: 220px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            cursor: pointer;
        }
        .animal-info {
            padding: 16px;
            text-align: center;
        }
        .animal-info h2 {
            font-size: 28px;
            color: #42b983;
            margin-bottom: 8px;
        }
        .animal-info p {
            color: #666;
            font-size: 16px;
        }
        .close-btn {
            margin-top: 12px;
            padding: 8px 24px;
            background: #ff7096;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>📖 字母动物启蒙英语</h1>
    <div class="control-buttons">
        <button class="ctrl-btn" id="btnUK">英式发音</button>
        <button class="ctrl-btn" id="btnUS">美式发音</button>
        <button class="ctrl-btn" id="btnFemale">女声</button>
        <button class="ctrl-btn" id="btnMale">男声</button>
    </div>

    <div class="card-container">
        <div class="letter-card" id="card">
            <div class="big-letter" id="letterDisplay">A</div>
            <div class="word-box" id="wordBox">
                <div class="animal-word" id="animalWord">Alligator</div>
                <div class="cn-name" id="cnName">鳄鱼</div>
            </div>
            <div class="tip">点击字母发音｜点击单词看动物</div>
        </div>
    </div>
    <button class="btn-next" id="nextBtn">随机换字母</button>

    <div class="animal-modal" id="animalModal">
        <div class="animal-modal-card">
            <div class="animal-image" id="animalImage">🐊</div>
            <div class="animal-info">
                <h2 id="modalLetter">A</h2>
                <p id="modalWord">Alligator 鳄鱼</p>
                <button class="close-btn" id="closeBtn">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // 字母基础数据
        const letterData = [
            { letter: "A", word: "Alligator", cn: "鳄鱼", emoji: "🐊" },
            { letter: "B", word: "Bee", cn: "蜜蜂", emoji: "🐝" },
            { letter: "C", word: "Caterpillar", cn: "毛毛虫", emoji: "🐛" },
            { letter: "D", word: "Duck", cn: "鸭子", emoji: "🦆" },
            { letter: "E", word: "Elephant", cn: "大象", emoji: "🐘" },
            { letter: "F", word: "Fish", cn: "小鱼", emoji: "🐟" },
            { letter: "G", word: "Goose", cn: "大白鹅", emoji: "🦢" },
            { letter: "H", word: "Horse", cn: "小马", emoji: "🐴" },
            { letter: "I", word: "Iguana", cn: "蜥蜴", emoji: "🦎" },
            { letter: "J", word: "Jaguar", cn: "美洲豹", emoji: "🐆" },
            { letter: "K", word: "Koala", cn: "考拉", emoji: "🐨" },
            { letter: "L", word: "Leaf", cn: "树叶", emoji: "🍃" },
            { letter: "M", word: "Monkey", cn: "猴子", emoji: "🐵" },
            { letter: "N", word: "Nest", cn: "鸟巢", emoji: "🪺" },
            { letter: "O", word: "Owl", cn: "猫头鹰", emoji: "🦉" },
            { letter: "P", word: "Panda", cn: "熊猫", emoji: "🐼" },
            { letter: "Q", word: "Quail", cn: "鹌鹑", emoji: "🐦" },
            { letter: "R", word: "Rabbit", cn: "兔子", emoji: "🐰" },
            { letter: "S", word: "Snake", cn: "小蛇", emoji: "🐍" },
            { letter: "T", word: "Tulip", cn: "郁金香", emoji: "🌷" },
            { letter: "U", word: "Umbrella plant", cn: "伞草", emoji: "🌿" },
            { letter: "V", word: "Vulture", cn: "秃鹫", emoji: "🦅" },
            { letter: "W", word: "Whale", cn: "鲸鱼", emoji: "🐋" },
            { letter: "X", word: "X-ray fish", cn: "X光鱼", emoji: "🐠" },
            { letter: "Y", word: "Yak", cn: "牦牛", emoji: "🐂" },
            { letter: "Z", word: "Zebra", cn: "斑马", emoji: "🦓" }
        ];

        // 发音配置（可替换为本地mp3路径）
        let isUK = true;    // 默认英式发音
        let isMale = false; // 默认女声
        let currentIndex = 0;

        // 音频映射模板，后续可替换真实mp3
        function getAudioUrl(letter) {
            const type = isUK ? 'uk' : 'us';
            const gender = isMale ? 'male' : 'female';
            // 此处为示例模板，如需离线可下载26字母发音mp3并修改路径，如 `audio/${type}/${gender}/${letter}.mp3`
            return `https://dict.youdao.com/dictvoice?audio=${letter}&type=${isUK?1:2}`;
        }

        const card = document.getElementById('card');
        const letterDisplay = document.getElementById('letterDisplay');
        const animalWord = document.getElementById('animalWord');
        const cnName = document.getElementById('cnName');
        const wordBox = document.getElementById('wordBox');
        const nextBtn = document.getElementById('nextBtn');
        const btnUK = document.getElementById('btnUK');
        const btnUS = document.getElementById('btnUS');
        const btnFemale = document.getElementById('btnFemale');
        const btnMale = document.getElementById('btnMale');
        const animalModal = document.getElementById('animalModal');
        const animalImage = document.getElementById('animalImage');
        const modalLetter = document.getElementById('modalLetter');
        const modalWord = document.getElementById('modalWord');
        const closeBtn = document.getElementById('closeBtn');

        // 切换发音模式按钮样式
        function updateBtnStyle() {
            btnUK.classList.toggle('active', isUK);
            btnUS.classList.toggle('active', !isUK);
            btnFemale.classList.toggle('active', !isMale);
            btnMale.classList.toggle('active', isMale);
        }
        updateBtnStyle();

        btnUK.onclick = () => { isUK = true; updateBtnStyle(); };
        btnUS.onclick = () => { isUK = false; updateBtnStyle(); };
        btnFemale.onclick = () => { isMale = false; updateBtnStyle(); };
        btnMale.onclick = () => { isMale = true; updateBtnStyle(); };

        function randomLetter() {
            const newIndex = Math.floor(Math.random() * letterData.length);
            currentIndex = newIndex;
            updateCard();
        }

        function updateCard() {
            const item = letterData[currentIndex];
            letterDisplay.textContent = item.letter;
            animalWord.textContent = item.word;
            cnName.textContent = item.cn;
        }

        // 纯字母音频播放函数
        function playLetterSound(letter) {
            const audio = new Audio(getAudioUrl(letter));
            audio.play();
        }

        function showAnimalCard() {
            const item = letterData[currentIndex];
            modalLetter.textContent = item.letter;
            modalWord.textContent = `${item.word} ${item.cn}`;
            animalImage.textContent = item.emoji;
            animalModal.classList.add('show');
        }

        function closeAnimalCard() {
            animalModal.classList.remove('show');
        }

        // 点击字母播放纯字母音频 + 动画
        letterDisplay.addEventListener('click', () => {
            const item = letterData[currentIndex];
            card.classList.add('animate');
            playLetterSound(item.letter);
            setTimeout(() => {
                card.classList.remove('animate');
            }, 350);
        });

        wordBox.addEventListener('click', showAnimalCard);
        closeBtn.addEventListener('click', closeAnimalCard);
        animalModal.addEventListener('click', (e) => {
            if (e.target === animalModal) closeAnimalCard();
        });

        nextBtn.addEventListener('click', randomLetter);
        randomLetter();
    </script>
</body>
</html>
