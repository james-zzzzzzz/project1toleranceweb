<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幼儿26字母英语启蒙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #fff7e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #ff7096;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }

        .card-container {
            width: 320px;
            height: 420px;
            position: relative;
            perspective: 1000px;
        }

        .letter-card {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 0.4s ease, opacity 0.4s ease;
            z-index: 2;
        }

        .letter-card.animate {
            transform: scale(1.1) rotate(3deg);
        }

        .big-letter {
            font-size: 110px;
            font-weight: bold;
            color: #42b983;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s ease;
        }

        .big-letter:hover {
            transform: scale(1.08);
        }

        .big-letter:active {
            transform: scale(0.95);
        }

        .word-box {
            margin-top: 20px;
            padding: 12px 24px;
            background: #ffedcc;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .word-box:hover {
            background: #ffdf99;
            transform: scale(1.05);
        }

        .word-box:active {
            transform: scale(0.95);
        }

        .animal-word {
            font-size: 24px;
            color: #666;
            font-weight: bold;
        }

        .cn-name {
            font-size: 16px;
            color: #999;
            margin-top: 4px;
        }

        .tip {
            font-size: 14px;
            color: #bbb;
            text-align: center;
            margin-top: 18px;
            line-height: 1.6;
        }

        .btn-next {
            margin-top: 30px;
            padding: 12px 30px;
            background: #57cc99;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-next:hover {
            background: #38a3a5;
        }

        .btn-next:active {
            background: #2d7a7c;
        }

        /* 动物图片卡片 */
        .animal-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .animal-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .animal-modal-card {
            background: white;
            width: 300px;
            border-radius: 24px;
            overflow: hidden;
            transform: translateY(50px);
            transition: transform 0.4s ease;
        }

        .animal-modal.show .animal-modal-card {
            transform: translateY(0);
        }

        .animal-image {
            width: 100%;
            height: 220px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .animal-image:hover {
            transform: scale(1.02);
        }

        .animal-info {
            padding: 16px;
            text-align: center;
            text-align: center;
        }

        .animal-info h2 {
            font-size: 28px;
            color: #42b983;
            margin-bottom: 8px;
        }

        .animal-info p {
            color: #666;
            font-size: 16px;
        }

        .close-btn {
            margin-top: 12px;
            padding: 8px 24px;
            background: #ff7096;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
        }

        .close-btn:hover {
            background: #ff4d6d;
        }
    </style>
</head>
<body>
    <h1>📖 字母动物启蒙英语</h1>

    <div class="card-container">
        <div class="letter-card" id="card">
            <div class="big-letter" id="letterDisplay">A</div>

            <div class="word-box" id="wordBox">
                <div class="animal-word" id="animalWord">Alligator</div>
                <div class="cn-name" id="cnName">鳄鱼</div>
            </div>

            <div class="tip">
                点击字母发音<br>
                点击单词看动物
            </div>
        </div>
    </div>

    <button class="btn-next" id="nextBtn">随机换字母</button>

    <!-- 动物图片卡片弹窗 -->
    <div class="animal-modal" id="animalModal">
        <div class="animal-modal-card">
            <div class="animal-image" id="animalImage">🐊</div>
            <div class="animal-info">
                <h2 id="modalLetter">A</h2>
                <p id="modalWord">Alligator 鳄鱼</p>
                <button class="close-btn" id="closeBtn">关闭</button>
            </div>
        </div>
    </div>

    <script>
        const letterData = [
            { letter: "A", word: "Alligator", cn: "鳄鱼", emoji: "🐊" },
            { letter: "B", word: "Bee", cn: "蜜蜂", emoji: "🐝" },
            { letter: "C", word: "Caterpillar", cn: "毛毛虫", emoji: "🐛" },
            { letter: "D", word: "Duck", cn: "鸭子", emoji: "🦆" },
            { letter: "E", word: "Elephant", cn: "大象", emoji: "🐘" },
            { letter: "F", word: "Fish", cn: "小鱼", emoji: "🐟" },
            { letter: "G", word: "Goose", cn: "大白鹅", emoji: "🦢" },
            { letter: "H", word: "Horse", cn: "小马", emoji: "🐴" },
            { letter: "I", word: "Iguana", cn: "蜥蜴", emoji: "🦎" },
            { letter: "J", word: "Jaguar", cn: "美洲豹", emoji: "🐆" },
            { letter: "K", word: "Koala", cn: "考拉", emoji: "🐨" },
            { letter: "L", word: "Leaf", cn: "树叶", emoji: "🍃" },
            { letter: "M", word: "Monkey", cn: "猴子", emoji: "🐵" },
            { letter: "N", word: "Nest", cn: "鸟巢", emoji: "🪺" },
            { letter: "O", word: "Owl", cn: "猫头鹰", emoji: "🦉" },
            { letter: "P", word: "Panda", cn: "熊猫", emoji: "🐼" },
            { letter: "Q", word: "Quail", cn: "鹌鹑", emoji: "🐦" },
            { letter: "R", word: "Rabbit", cn: "兔子", emoji: "🐰" },
            { letter: "S", word: "Snake", cn: "小蛇", emoji: "🐍" },
            { letter: "T", word: "Tulip", cn: "郁金香", emoji: "🌷" },
            { letter: "U", word: "Umbrella plant", cn: "伞草", emoji: "🌿" },
            { letter: "V", word: "Vulture", cn: "秃鹫", emoji: "🦅" },
            { letter: "W", word: "Whale", cn: "鲸鱼", emoji: "🐋" },
            { letter: "X", word: "X-ray fish", cn: "X光鱼", emoji: "🐠" },
            { letter: "Y", word: "Yak", cn: "牦牛", emoji: "🐂" },
            { letter: "Z", word: "Zebra", cn: "斑马", emoji: "🦓" }
        ];

        let currentIndex = 0;
        let voices = [];

        const card = document.getElementById('card');
        const letterDisplay = document.getElementById('letterDisplay');
        const animalWord = document.getElementById('animalWord');
        const cnName = document.getElementById('cnName');
        const wordBox = document.getElementById('wordBox');
        const nextBtn = document.getElementById('nextBtn');

        const animalModal = document.getElementById('animalModal');
        const animalImage = document.getElementById('animalImage');
        const modalLetter = document.getElementById('modalLetter');
        const modalWord = document.getElementById('modalWord');
        const closeBtn = document.getElementById('closeBtn');

        // 加载语音列表
        function loadVoices() {
            voices = window.speechSynthesis.getVoices();
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function randomLetter() {
            const newIndex = Math.floor(Math.random() * letterData.length);
            currentIndex = newIndex;
            updateCard();
        }

        function updateCard() {
            const item = letterData[currentIndex];
            letterDisplay.textContent = item.letter;
            animalWord.textContent = item.word;
            cnName.textContent = item.cn;
        }

        // 纯朗读函数：只朗读传入文本，优先干净 en-GB 英式语音
        function speak(text) {
            window.speechSynthesis.cancel(); // 立刻停止所有正在朗读语音，杜绝残留/前缀语音
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-GB';
            utterance.rate = 0.7;
            utterance.pitch = 1;

            // 筛选干净的英式语音，排除异常第三方语音
            const cleanUkVoice = voices.find(v => v.lang === 'en-GB' && !v.name.toLowerCase().includes('kapetou'));
            if (cleanUkVoice) {
                utterance.voice = cleanUkVoice;
            }
            window.speechSynthesis.speak(utterance);
        }

        function showAnimalCard() {
            const item = letterData[currentIndex];
            modalLetter.textContent = item.letter;
            modalWord.textContent = `${item.word} ${item.cn}`;
            animalImage.textContent = item.emoji;
            animalModal.classList.add('show');
            speak(item.word);
        }

        function closeAnimalCard() {
            animalModal.classList.remove('show');
        }

        // 点击字母：仅读单个纯字母
        letterDisplay.addEventListener('click', () => {
            const item = letterData[currentIndex];
            card.classList.add('animate');
            speak(item.letter);
            setTimeout(() => {
                card.classList.remove('animate');
            }, 350);
        });

        // 点击单词：弹出卡片+读单词
        wordBox.addEventListener('click', showAnimalCard);
        animalImage.addEventListener('click', () => {
            const item = letterData[currentIndex];
            speak(item.word);
        });

        closeBtn.addEventListener('click', closeAnimalCard);
        animalModal.addEventListener('click', (e) => {
            if (e.target === animalModal) closeAnimalCard();
        });

        nextBtn.addEventListener('click', randomLetter);
        randomLetter();
    </script>
</body>
</html>
