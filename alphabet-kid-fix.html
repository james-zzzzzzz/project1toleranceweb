<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>幼儿26字母英语启蒙｜真实录音版</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Microsoft YaHei", sans-serif;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        background: #fff7e6;
        width: 100%;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overscroll-behavior: none;
    }

    h1 {
        color: #ff7096;
        margin-bottom: 12px;
        font-size: 24px;
    }

    .control-buttons {
        display: flex;
        gap: 8px;
        margin-bottom: 18px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .ctrl-btn {
        padding: 8px 12px;
        border-radius: 20px;
        border: none;
        background: #70bfff;
        color: white;
        font-size: 15px;
        cursor: pointer;
    }

    .ctrl-btn.active {
        background: #2980b9;
    }

    .card-container {
        width: 320px;
        height: 420px;
        position: relative;
        perspective: 1000px;
    }

    .letter-card {
        width: 100%;
        height: 100%;
        background: white;
        border-radius: 24px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: absolute;
        top: 0;
        left: 0;
        transition: transform 0.4s ease;
        z-index: 2;
    }

    .letter-card.animate {
        transform: scale(1.1) rotate(3deg);
    }

    .big-letter {
        font-size: 110px;
        font-weight: bold;
        color: #42b983;
        cursor: pointer;
        user-select: none;
        transition: transform 0.2s ease;
    }

    .word-box {
        margin-top: 20px;
        padding: 12px 24px;
        background: #ffedcc;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .word-box:hover {
        background: #ffdf99;
        transform: scale(1.05);
    }

    .word-box:active {
        transform: scale(0.95);
    }

    .animal-word {
        font-size: 24px;
        color: #666;
        font-weight: bold;
    }

    .cn-name {
        font-size: 16px;
        color: #999;
        margin-top: 4px;
    }

    .tip {
        font-size: 13px;
        color: #bbb;
        text-align: center;
        margin-top: 18px;
        line-height: 1.6;
    }

    .btn-next {
        margin-top: 20px;
        padding: 12px 30px;
        background: #57cc99;
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 18px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h1>📖 字母动物启蒙英语｜真实录音版</h1>

<div class="control-buttons">
    <button class="ctrl-btn" id="btnUK">英式发音</button>
    <button class="ctrl-btn" id="btnUS">美式发音</button>
    <button class="ctrl-btn" id="btnFemale">女声</button>
    <button class="ctrl-btn" id="btnMale">男声</button>
</div>

<div class="card-container">
    <div class="letter-card" id="card">
        <div class="big-letter" id="letterDisplay">A</div>

        <div class="word-box" id="wordBox">
            <div class="animal-word" id="animalWord">Alligator</div>
            <div class="cn-name" id="cnName">鳄鱼</div>
        </div>

        <div class="tip">
            点击字母读字母<br>
            点击单词读单词
        </div>
    </div>
</div>

<button class="btn-next" id="nextBtn">随机换字母</button>

<script>
    const letterData = [
        { letter: "A", word: "Alligator", cn: "鳄鱼" },
        { letter: "B", word: "Bee", cn: "蜜蜂" },
        { letter: "C", word: "Caterpillar", cn: "毛毛虫" },
        { letter: "D", word: "Duck", cn: "鸭子" },
        { letter: "E", word: "Elephant", cn: "大象" },
        { letter: "F", word: "Fish", cn: "鱼" },
        { letter: "G", word: "Goose", cn: "鹅" },
        { letter: "H", word: "Horse", cn: "马" },
        { letter: "I", word: "Iguana", cn: "鬣蜥" },
        { letter: "J", word: "Jaguar", cn: "美洲豹" },
        { letter: "K", word: "Koala", cn: "考拉" },
        { letter: "L", word: "Leaf", cn: "树叶" },
        { letter: "M", word: "Monkey", cn: "猴子" },
        { letter: "N", word: "Nest", cn: "鸟巢" },
        { letter: "O", word: "Owl", cn: "猫头鹰" },
        { letter: "P", word: "Panda", cn: "熊猫" },
        { letter: "Q", word: "Quail", cn: "鹌鹑" },
        { letter: "R", word: "Rabbit", cn: "兔子" },
        { letter: "S", word: "Snake", cn: "蛇" },
        { letter: "T", word: "Tulip", cn: "郁金香" },
        { letter: "U", word: "Umbrella plant", cn: "伞草" },
        { letter: "V", word: "Vulture", cn: "秃鹫" },
        { letter: "W", word: "Whale", cn: "鲸鱼" },
        { letter: "X", word: "X-ray fish", cn: "X光鱼" },
        { letter: "Y", word: "Yak", cn: "牦牛" },
        { letter: "Z", word: "Zebra", cn: "斑马" }
    ];

    let isUK = true;
    let isMale = false;
    let currentIndex = 0;
    const basePath = "./audio/";

    const card = document.getElementById('card');
    const letterDisplay = document.getElementById('letterDisplay');
    const animalWord = document.getElementById('animalWord');
    const cnName = document.getElementById('cnName');
    const wordBox = document.getElementById('wordBox');
    const nextBtn = document.getElementById('nextBtn');
    const btnUK = document.getElementById('btnUK');
    const btnUS = document.getElementById('btnUS');
    const btnFemale = document.getElementById('btnFemale');
    const btnMale = document.getElementById('btnMale');

    function updateBtnStyle() {
        btnUK.classList.toggle('active', isUK);
        btnUS.classList.toggle('active', !isUK);
        btnFemale.classList.toggle('active', !isMale);
        btnMale.classList.toggle('active', isMale);
    }
    updateBtnStyle();

    btnUK.onclick = () => { isUK = true; updateBtnStyle(); };
    btnUS.onclick = () => { isUK = false; updateBtnStyle(); };
    btnFemale.onclick = () => { isMale = false; updateBtnStyle(); };
    btnMale.onclick = () => { isMale = true; updateBtnStyle(); };

    function getFolder() {
        const acc = isUK ? 'uk' : 'us';
        const gender = isMale ? 'male' : 'female';
        return `${acc}_${gender}/`;
    }

    function playAudio(filename) {
        const audio = new Audio(basePath + getFolder() + filename + ".mp3");
        audio.play();
    }

    function randomLetter() {
        const newIndex = Math.floor(Math.random() * letterData.length);
        currentIndex = newIndex;
        updateCard();
    }

    function updateCard() {
        const item = letterData[currentIndex];
        letterDisplay.textContent = item.letter;
        animalWord.textContent = item.word;
        cnName.textContent = item.cn;
    }

    // 点击字母发音 + 动画
    letterDisplay.addEventListener('click', () => {
        const item = letterData[currentIndex];
        card.classList.add('animate');
        playAudio(item.letter);
        setTimeout(() => {
            card.classList.remove('animate');
        }, 350);
    });

    // 点击单词发音
    wordBox.addEventListener('click', () => {
        const item = letterData[currentIndex];
        playAudio(item.word);
    });

    nextBtn.addEventListener('click', randomLetter);
    randomLetter();
</script>

</body>
</html>
